# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and Deploy Frontend to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: "ubuntu-latest"
    environment:
      name: "production"
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: ./web-agents
        run: npm install --legacy-peer-deps

      - name: Generate Prisma Client
        working-directory: ./web-agents
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run Prisma Migrations
        working-directory: ./web-agents
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Verify Docker installation
        run: |
          # Test Docker installation
          docker --version
          docker info

          # Check if we can run Docker commands
          docker ps

          # Test Docker daemon is running
          docker run --rm hello-world

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ vars.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v5
        with:
          context: ./web-agents
          push: true
          tags: |
            ${{ vars.ACR_LOGIN_SERVER }}/web-agents/prod:${{ github.sha }}
            ${{ vars.ACR_LOGIN_SERVER }}/web-agents/prod:latest
          file: ./web-agents/dockerfile

      - name: Deploy container image to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ vars.ACR_LOGIN_SERVER }}/web-agents/prod:${{ github.sha }}
